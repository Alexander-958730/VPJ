<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Denuncias - ONPECO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: white;
            padding: 35px 40px 45px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        h1 {
            color: #1a2634;
            font-weight: 600;
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .subtitulo {
            text-align: center;
            color: #7a8a9e;
            font-size: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 18px;
        }

        .grafico-container {
            margin-top: 5px;
            padding: 0 5px;
        }

        canvas {
            max-height: 400px;
            width: 100% !important;
        }

        .info {
            text-align: center;
            margin-top: 25px;
            color: #8899aa;
            font-size: 13px;
            border-top: 1px solid #eef2f7;
            padding-top: 20px;
        }

        /* ========== BOTÓN FLOTANTE PEQUEÑO Y DISCRETO ========== */
        .btn-flotante {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 9999;
            background: rgba(44, 62, 80, 0.85);
            backdrop-filter: blur(6px);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 0.2px;
        }

        .btn-flotante:hover {
            background: #1a2634;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(26, 38, 52, 0.25);
            color: white;
        }

        .btn-flotante i {
            font-size: 14px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 22px;
            }
            .btn-flotante {
                bottom: 15px;
                right: 15px;
                padding: 8px 14px;
                font-size: 12px;
                gap: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 Panel de Denuncias</h1>
        <div class="subtitulo">ONPECO · Monitoreo de denuncias registradas</div>

        <div class="grafico-container">
            <canvas id="graficoDenuncias"></canvas>
        </div>
        <div class="info">
            Datos actualizados al día de hoy
        </div>
    </div>

    <!-- ========== BOTÓN FLOTANTE PEQUEÑO ========== -->
    <a href="/denuncias/portal/" class="btn-flotante">
        ← Volver
    </a>

    <script>
        fetch('/denuncias/api/denuncias-por-mes/')
            .then(response => response.json())
            .then(data => {
                const ctx = document.getElementById('graficoDenuncias').getContext('2d');

                // Colores llamativos para las barras
                const colores = [
                    'rgba(231, 76, 60, 0.85)',
                    'rgba(230, 126, 34, 0.85)',
                    'rgba(241, 196, 15, 0.85)',
                    'rgba(46, 204, 113, 0.85)',
                    'rgba(52, 152, 219, 0.85)',
                    'rgba(155, 89, 182, 0.85)',
                    'rgba(26, 188, 156, 0.85)',
                    'rgba(231, 76, 60, 0.85)',
                    'rgba(230, 126, 34, 0.85)',
                    'rgba(241, 196, 15, 0.85)',
                    'rgba(46, 204, 113, 0.85)',
                    'rgba(52, 152, 219, 0.85)'
                ];

                const bordes = [
                    '#c0392b', '#d35400', '#d4ac0d', '#27ae60',
                    '#2e86c1', '#8e44ad', '#16a085', '#c0392b',
                    '#d35400', '#d4ac0d', '#27ae60', '#2e86c1'
                ];

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            label: 'Denuncias',
                            data: data.datos,
                            backgroundColor: colores.slice(0, data.datos.length),
                            borderColor: bordes.slice(0, data.datos.length),
                            borderWidth: 2.5,
                            borderRadius: 8,
                            borderSkipped: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0,0,0,0.8)',
                                titleFont: { size: 14, weight: '600' },
                                bodyFont: { size: 13 },
                                cornerRadius: 10,
                                padding: 12,
                                callbacks: {
                                    label: function(context) {
                                        return `📌 ${context.raw} denuncias`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1,
                                    precision: 0,
                                    font: { size: 13, weight: '500' },
                                    color: '#555'
                                },
                                title: {
                                    display: true,
                                    text: 'Número de denuncias',
                                    font: { size: 14, weight: '600' },
                                    color: '#333'
                                },
                                grid: {
                                    color: 'rgba(0,0,0,0.05)',
                                    drawBorder: false
                                }
                            },
                            x: {
                                ticks: {
                                    font: { size: 12, weight: '500' },
                                    color: '#555'
                                },
                                title: {
                                    display: true,
                                    text: 'Mes',
                                    font: { size: 14, weight: '600' },
                                    color: '#333'
                                },
                                grid: {
                                    display: false
                                }
                            }
                        },
                        animation: {
                            duration: 800,
                            easing: 'easeOutQuart'
                        }
                    }
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.querySelector('.grafico-container').innerHTML =
                    '<p style="color: #c0392b; text-align: center; font-weight: 500; padding: 30px;">⚠️ Error al cargar los datos. Verifica que el servidor esté corriendo.</p>';
            });
    </script>

</body>
</html>
