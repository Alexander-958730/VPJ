{% extends 'base/base.html' %}

{% block title %}Contraseña restablecida - VPJ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-check-circle"></i> ¡Contraseña restablecida!</h4>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-check-circle text-success" style="font-size: 48px;"></i>
                <h5 class="mt-3">Tu contraseña ha sido cambiada exitosamente</h5>
                <p class="text-muted">Ahora puedes iniciar sesión con tu nueva contraseña.</p>
                <hr>
                <a href="{% url 'users:login' %}" class="btn btn-success">
                    <i class="fas fa-sign-in-alt"></i> Iniciar sesión
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
